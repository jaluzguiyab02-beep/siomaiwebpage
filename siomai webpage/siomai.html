<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chick'n Blossom</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#fff8e1,#ffe082,#ffd54f);
color:#333;
animation:fadePage 1s ease;
}

@keyframes fadePage{
from{opacity:0;}
to{opacity:1;}
}

.container{
width:90%;
max-width:1100px;
margin:auto;
}

.hero-header{
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
background:linear-gradient(135deg,#ffcc33,#ffb300,#ffa000);
padding:80px 20px;
color:#4e342e;
}

.hero-header div{
animation:slideDown 1s ease;
}

@keyframes slideDown{
from{transform:translateY(-40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.hero-header img{
display:block;
margin-bottom:15px;
}

.hero-header h1{
font-size:52px;
margin:0;
}

.tagline{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.hero{
text-align:center;
padding:40px 20px;
}

.products{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:60px 20px;
}

.card{
background:white;
padding:30px;
width:230px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
text-align:center;
transition: all 0.4s ease;
}

.card:hover{
transform: translateY(-12px) scale(1.05) rotate(-1deg);
box-shadow: 0 20px 40px rgba(255, 165, 0, 0.3);
}

.price{
color:#ff6f00;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.order{
text-align:center;
padding:60px 20px;
}

.order button{
background:#ff9800;
border:none;
padding:14px 30px;
font-size:16px;
border-radius:50px;
color:white;
cursor:pointer;
transition:all 0.3s ease;
margin-top:20px;
}

.order button:hover{
background:#f57c00;
transform:scale(1.05);
}

.socials{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.socials a{
text-decoration:none;
padding:12px 20px;
border-radius:50px;
background:#ffe082;
color:#4e342e;
font-weight:bold;
transition:all 0.3s ease;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:inline-block;
}

.socials a:hover{
background:#ffd54f;
transform:scale(1.1);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
animation:pop 0.3s ease;
}

@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1.1);}
}

/* Fade-in animation for staggered effect */
.fade-in {
  opacity: 0;
  transform: translateY(30px);
  animation:fadeUp 0.8s forwards;
}

@keyframes fadeUp{
to {
opacity:1;
transform:translateY(0);
}
}

footer{
text-align:center;
padding:30px;
background:#ffcc33;
color:#4e342e;
font-weight:bold;
border-top:2px solid #ffa000;
opacity:0;
animation:fadeUp 0.8s forwards;
animation-delay:1.4s;
}

@media(max-width:768px){
.hero-header{
flex-direction:column;
text-align:center;
}
.hero-header div{
margin-bottom:20px;
}
.hero-header img{
margin:auto;
}
}
</style>
</head>

<body>

<section class="hero-header fade-in" style="animation-delay:0s;">

  <div style="flex:1; min-width:250px; display:flex; align-items:center; gap:15px;">
    <img src="pics/logo.jpg" alt="Chick'n Blossom Logo" 
         style="width:80px; height:80px; object-fit:cover; border-radius:50%;">
    <div>
      <h1>Chick'n Blossom</h1>
      <p class="tagline">Siomai with a Healthy Twist</p>
    </div>
  </div>

  <div style="flex:1; min-width:250px; text-align:right;">
    <img src="pics/siomai.jpg" alt="Chick'n Blossom Siomai" 
         style="max-width:60%; height:auto; border-radius:50px; box-shadow:0 8px 20px rgba(0,0,0,0.2);">
  </div>

</section>

<section class="products">
  <div class="card fade-in" style="animation-delay:0.4s;">
    <h3>Fried Chick'n Blossom</h3>
    <p class="price">₱20</p>
    <p>4pcs</p>
  </div>

  <div class="card fade-in" style="animation-delay:0.6s;">
    <h3>Steamed Chick'n Blossom</h3>
    <p class="price">₱20</p>
    <p>4pcs</p>
  </div>

  <div class="card fade-in" style="animation-delay:0.8s;">
    <h3>Chick'n Blossom Special</h3>
    <p class="price">₱40</p>
    <p>5pcs siomai with a drink</p>
  </div>
</section>

<section class="order fade-in" style="animation-delay:1s;">
<p>Contact us or visit our social media pages.</p>

<p><strong>📞 0953-689-5712</strong></p>

<button>Order Now</button>

<div class="socials">
<a href="https://www.facebook.com/profile.php?id=61582190765139">Facebook</a>
<a href="#">Instagram</a>
<a href="#">TikTok</a>
</div>
</section>

<footer>
<p>© 2026 Chick'n Blossom</p>
</footer>

</body>
</html>
